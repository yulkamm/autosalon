<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AutoSalon{% endblock %} - Автосалон Премиум</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="logo">🚗 AutoSalon</div>
            <ul class="nav-links">
                <li><a href="{{ url_for('main.index') }}">Главная</a></li>
                <li><a href="{{ url_for('main.about') }}">О нас</a></li>
                <li><a href="{{ url_for('main.contacts') }}">Контакты</a></li>
                <li><a href="{{ url_for('main.cars_list') }}">Автопарк</a></li>
            </ul>
        </div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 AutoSalon Premium. Все права защищены.</p>
        </div>
    </footer>
</body>
</html>

{% extends "admin/base_admin.html" %}

{% block title %}{{ 'Редактировать' if customer else 'Добавить' }} клиента{% endblock %}

{% block content %}
<div class="admin-header">
    <h1>{{ ' Редактировать клиента' if customer else ' Добавить клиента' }}</h1>
    <a href="{{ url_for('main.admin_customers') }}" class="btn"> Назад к списку</a>
</div>

<form method="POST" class="admin-form">
    <div class="form-row">
        <div class="form-group">
            <label for="full_name">ФИО:</label>
            <input type="text" id="full_name" name="full_name" value="{{ customer.full_name if customer else '' }}" required>
        </div>
        <div class="form-group">
            <label for="phone">Телефон:</label>
            <input type="text" id="phone" name="phone" value="{{ customer.phone if customer else '' }}" required>
        </div>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" value="{{ customer.email if customer else '' }}" required>
        </div>
        <div class="form-group">
            <label for="preferred_car">Предпочитаемое авто:</label>
            <input type="text" id="preferred_car" name="preferred_car" value="{{ customer.preferred_car if customer else '' }}" required>
        </div>
    </div>
    
    <div class="form-group">
        <label for="address">Адрес:</label>
        <input type="text" id="address" name="address" value="{{ customer.address if customer else '' }}" required>
    </div>
    
    <div class="form-row">
        <div class="form-group">
            <label for="birth_date">Дата рождения:</label>
            <input type="date" id="birth_date" name="birth_date" value="{{ customer.birth_date if customer else '' }}" required>
        </div>
        <div class="form-group">
            <label for="status">Статус:</label>
            <select id="status" name="status" required>
                <option value="Active" {{ 'selected' if customer and customer.status == 'Active' }}>Active</option>
                <option value="VIP" {{ 'selected' if customer and customer.status == 'VIP' }}>VIP</option>
                <option value="Regular" {{ 'selected' if customer and customer.status == 'Regular' }}>Regular</option>
                <option value="New" {{ 'selected' if customer and customer.status == 'New' }}>New</option>
                <option value="Pending" {{ 'selected' if customer and customer.status == 'Pending' }}>Pending</option>
            </select>
        </div>
    </div>
    
    <div class="form-group">
        <label for="photo_num">Номер фото (1-10):</label>
        <input type="number" id="photo_num" name="photo_num" value="1" min="1" max="10">
    </div>
    
    <button type="submit" class="btn btn-primary">{{ 'Сохранить' if customer else 'Добавить' }}</button>
</form>
{% endblock %}
